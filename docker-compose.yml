version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: literature_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: literature_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgweb:
    image: sosedoff/pgweb
    container_name: literature_pgweb
    environment:
      # Connect pgweb to the database container using docker DNS
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/literature_db?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
